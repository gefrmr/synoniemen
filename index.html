<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Synoniemen oefenen - PT-BR → NL</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 1rem;
            background: #f0f7ff;
            color: #1e2a3a;
        }
        h1 {
            text-align: center;
            color: #0f3b5c;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .main-word {
            text-align: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .main-word h2 {
            font-size: 2rem;
            margin: 0.5rem 0;
            color: #1e6f5c;
        }
        .main-word p {
            font-size: 1.2rem;
            color: #2c3e50;
            margin: 0;
        }
        .category {
            text-align: center;
            font-size: 0.9rem;
            color: #4a627a;
            background: #e9ecef;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-top: 0.5rem;
        }
        /* Grid van tegels: 2 kolommen, automatisch rijen */
        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .tile {
            background: #f9f9fc;
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        .nl-word {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.8rem;
            background: #eef2f7;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }
        .pt-word {
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 12px;
            background: #ffffff;
            transition: 0.2s;
            display: inline-block;
            min-width: 120px;
        }
        .blurred-letters {
            filter: blur(4px);
        }
        .revealed {
            background: #d4e6f1;
        }
        .progress {
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
            color: #2c6e9e;
        }
        .next-btn, .reset-btn, .auth-btn {
            background: #1e6f5c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            margin: 0.5rem;
            transition: 0.2s;
        }
        .next-btn:hover, .reset-btn:hover, .auth-btn:hover {
            background: #0e4f40;
            transform: scale(1.02);
        }
        .next-btn:disabled {
            background: #b0bec5;
            cursor: not-allowed;
        }
        .feedback {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 1rem;
            color: #2c6e9e;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6c7a89;
        }
        .star {
            font-size: 1.5rem;
            cursor: pointer;
            color: #ccc;
            transition: 0.2s;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        .star.favorited {
            color: gold;
        }
        .header-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            background: none;
            border: none;
        }
        @media (max-width: 600px) {
            .tiles-grid {
                grid-template-columns: 1fr;
            }
            .nl-word {
                font-size: 1rem;
            }
            .pt-word {
                font-size: 0.9rem;
            }
            .main-word h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <h1>📖 Synoniemen oefenen (PT-BR → NL)</h1>
    <div id="app">
        <div class="loading">⏳ Laden...</div>
    </div>
    <footer>
        Data uit Google Sheets | Klik op een Portugees woord (geblurd) om het te ontbluren
    </footer>

    <script>
        // Vervang onderstaande waarden door die van jouw OAuth 2.0 client
        const CLIENT_ID = '37826920170-n9gtl90kfn7tkeq0fn2nhebe7jl6eqjb.apps.googleusercontent.com';   // Verkrijg via Google Cloud Console
        const API_KEY = '';   // Niet nodig bij OAuth, maar we laten leeg
        const SHEET_ID = '1wHmIeIga8mYQG4h4uuvgPiehn-pc0D7Ptyma9bVnfv0';        // ID van je Google Sheet
        const SHEET_NAME = 'Blad1';                                     // Naam van het tabblad
        // ====================================
        
        let tokenClient = null;
        let accessToken = null;
        let gapiInitialized = false;
        let exercises = [];          // volledige lijst van oefeningen (incl. scores, favoriet)
        let currentExercise = null;   // huidige oefening (object)
        let currentRevealed = [];     // per synoniem of ontblurd is
        let allRevealed = false;

        // Helper: random integer
        function randomInt(max) {
            return Math.floor(Math.random() * max);
        }

        // Kies een nieuwe oefening op basis van de laagste score
        function pickNextExercise() {
            if (!exercises.length) return null;
            // Vind de minimale score
            const minScore = Math.min(...exercises.map(ex => ex.score));
            // Filter oefeningen met die minimale score
            const candidates = exercises.filter(ex => ex.score === minScore);
            // Kies willekeurig uit de kandidaten
            const randomIndex = randomInt(candidates.length);
            return candidates[randomIndex];
        }

        // Laad alle data uit de sheet (inclusief Score en Favoriet kolommen)
        async function loadSheetData() {
            if (!accessToken) throw new Error('Niet ingelogd');
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?access_token=${accessToken}`;
            const response = await fetch(url);
            const data = await response.json();
            if (!data.values) throw new Error('Geen data gevonden');
            return parseSheetData(data.values);
        }

        // Data parsen: kolommen: Categorie, hoofd_werkwoord_pt, hoofd_vertaling_nl, synoniem_pt1, synoniem_nl1, ..., Score, Favoriet
        function parseSheetData(rows) {
            if (rows.length < 2) return [];
            const headers = rows[0].map(h => h ? h.trim().toLowerCase() : '');
            // Zoek indices
            const catIdx = headers.findIndex(h => h === 'categorie');
            const mainPtIdx = headers.findIndex(h => h === 'hoofd_werkwoord_pt');
            const mainNlIdx = headers.findIndex(h => h === 'hoofd_vertaling_nl');
            const scoreIdx = headers.findIndex(h => h === 'score');
            const favIdx = headers.findIndex(h => h === 'favoriet');
            if (mainPtIdx === -1 || mainNlIdx === -1) {
                throw new Error('Verplichte kolommen niet gevonden');
            }
            // Verzamel synoniem paren
            const synonymPairs = [];
            for (let i = 0; i < headers.length; i++) {
                if (headers[i].startsWith('synoniem_pt')) {
                    const nlHeader = headers[i].replace('pt', 'nl');
                    const nlIdx = headers.findIndex(h => h === nlHeader);
                    if (nlIdx !== -1) {
                        synonymPairs.push({ ptIdx: i, nlIdx: nlIdx });
                    }
                }
            }
            const exercisesList = [];
            for (let r = 1; r < rows.length; r++) {
                const row = rows[r];
                if (!row || row.length === 0) continue;
                const mainPt = row[mainPtIdx]?.trim();
                const mainNl = row[mainNlIdx]?.trim();
                if (!mainPt || !mainNl) continue;
                const category = catIdx !== -1 ? (row[catIdx]?.trim() || '') : '';
                const score = (scoreIdx !== -1 && row[scoreIdx]) ? parseInt(row[scoreIdx], 10) : 0;
                const favorite = (favIdx !== -1 && row[favIdx]) ? parseInt(row[favIdx], 10) : 0;
                const synonyms = [];
                for (let pair of synonymPairs) {
                    const pt = row[pair.ptIdx]?.trim();
                    const nl = row[pair.nlIdx]?.trim();
                    if (pt && nl) {
                        synonyms.push({ pt, nl });
                    }
                }
                if (synonyms.length === 0) continue;
                exercisesList.push({
                    rowIndex: r,           // 1‑gebaseerde rij in sheet (voor updates)
                    mainPt, mainNl, category, score, favorite,
                    synonyms
                });
            }
            return exercisesList;
        }

        // Update score van een oefening in de sheet (verhoog met 1)
        async function updateScore(exercise) {
            if (!accessToken) return;
            const newScore = exercise.score + 1;
            const range = `${SHEET_NAME}!Score${exercise.rowIndex+1}`; // +1 omdat we 1‑based rij gebruiken, maar rowIndex is al 1‑based? In parseSheetData hebben we r (1‑based) opgeslagen. Ja.
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW&access_token=${accessToken}`;
            const body = {
                values: [[newScore]]
            };
            try {
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                // Update lokaal
                exercise.score = newScore;
            } catch (err) {
                console.error('Score update mislukt', err);
            }
        }

        // Update favoriet status in sheet
        async function updateFavorite(exercise, newValue) {
            if (!accessToken) return;
            const range = `${SHEET_NAME}!Favoriet${exercise.rowIndex+1}`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW&access_token=${accessToken}`;
            const body = {
                values: [[newValue]]
            };
            try {
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                exercise.favorite = newValue;
            } catch (err) {
                console.error('Favoriet update mislukt', err);
            }
        }

        // Render de huidige oefening
        function renderCurrentExercise() {
            if (!currentExercise) return;
            const ex = currentExercise;
            const synonyms = ex.synonyms;
            const revealed = currentRevealed;
            let tilesHtml = '';
            synonyms.forEach((syn, idx) => {
                const isRevealed = revealed[idx];
                let ptDisplayHtml = '';
                if (isRevealed) {
                    ptDisplayHtml = syn.pt;
                } else {
                    const firstLetter = syn.pt.charAt(0);
                    const restLetters = syn.pt.slice(1);
                    ptDisplayHtml = `${firstLetter}<span class="blurred-letters">${restLetters}</span>`;
                }
                tilesHtml += `
                    <div class="tile">
                        <div class="nl-word">${syn.nl}</div>
                        <div class="pt-word ${isRevealed ? 'revealed' : ''}" data-idx="${idx}">
                            ${ptDisplayHtml}
                        </div>
                    </div>
                `;
            });
            const allRevealedFlag = revealed.every(v => v === true);
            const nextDisabled = !allRevealedFlag;
            const starClass = ex.favorite === 1 ? 'favorited' : '';
            const html = `
                <div class="card">
                    <div class="header-line">
                        <div class="category">📂 ${ex.category || 'Geen categorie'}</div>
                        <div class="star ${starClass}" id="favoriteStar">⭐</div>
                    </div>
                    <div class="main-word">
                        <h2>${ex.mainPt}</h2>
                        <p>🇳🇱 ${ex.mainNl}</p>
                    </div>
                    <div class="tiles-grid">
                        ${tilesHtml}
                    </div>
                    <div class="progress">
                        Score: ${ex.score} | ${exercises.length} oefeningen totaal
                    </div>
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <button class="next-btn" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>➡ Volgende oefening</button>
                        <button class="reset-btn" id="resetBtn">🔄 Nieuwe selectie</button>
                    </div>
                    <div class="feedback" id="feedback">
                        ${!allRevealedFlag ? 'Klik op de Portugese woorden (geblurd) om ze te ontbluren.' : 'Alle woorden zijn ontblurd! Ga verder.'}
                    </div>
                </div>
            `;
            const app = document.getElementById('app');
            app.innerHTML = html;

            // Klik handlers voor Portugese woorden
            document.querySelectorAll('.pt-word').forEach(el => {
                el.addEventListener('click', (e) => {
                    const idx = parseInt(el.dataset.idx);
                    if (!currentRevealed[idx]) {
                        currentRevealed[idx] = true;
                        renderCurrentExercise();
                    }
                    e.stopPropagation();
                });
            });

            // Volgende knop
            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', async () => {
                    if (allRevealedFlag) {
                        // Eerst score verhogen en opslaan
                        await updateScore(currentExercise);
                        // Kies volgende oefening op basis van scores
                        const nextEx = pickNextExercise();
                        if (nextEx) {
                            currentExercise = nextEx;
                            currentRevealed = new Array(currentExercise.synonyms.length).fill(false);
                            renderCurrentExercise();
                        } else {
                            // Geen oefeningen meer? zou niet moeten
                            alert('Geen volgende oefening beschikbaar');
                        }
                    }
                });
            }

            // Reset / nieuwe selectie knop
            const resetBtn = document.getElementById('resetBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    const newEx = pickNextExercise();
                    if (newEx) {
                        currentExercise = newEx;
                        currentRevealed = new Array(currentExercise.synonyms.length).fill(false);
                        renderCurrentExercise();
                    }
                });
            }

            // Sterretje voor favoriet
            const star = document.getElementById('favoriteStar');
            if (star) {
                star.addEventListener('click', async (e) => {
                    const newFav = currentExercise.favorite === 1 ? 0 : 1;
                    await updateFavorite(currentExercise, newFav);
                    renderCurrentExercise(); // hertekenen om ster bij te werken
                    e.stopPropagation();
                });
            }
        }

        // Inloggen met Google
        function initGoogleAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets',
                callback: (tokenResponse) => {
                    accessToken = tokenResponse.access_token;
                    // Na inloggen data ophalen en starten
                    startApp();
                },
            });
            // Toon login knop als niet ingelogd
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="card" style="text-align: center;">
                    <p>Om toegang te krijgen tot je Google Sheet, moet je inloggen met je Google-account.</p>
                    <button class="auth-btn" id="loginBtn">🔑 Inloggen met Google</button>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', () => {
                tokenClient.requestAccessToken();
            });
        }

        async function startApp() {
            try {
                const data = await loadSheetData();
                if (data.length === 0) throw new Error('Geen geldige oefeningen gevonden');
                exercises = data;
                // Kies eerste oefening op basis van laagste score
                currentExercise = pickNextExercise();
                if (!currentExercise) throw new Error('Geen oefening geselecteerd');
                currentRevealed = new Array(currentExercise.synonyms.length).fill(false);
                renderCurrentExercise();
            } catch (err) {
                document.getElementById('app').innerHTML = `<div class="card" style="color:red;">❌ Fout: ${err.message}<br>Controleer of de sheet openbaar is (of je leesrechten hebt) en of de kolomnamen kloppen.</div>`;
                console.error(err);
            }
        }

        // Start de app door eerst in te loggen
        window.onload = () => {
            initGoogleAuth();
        };
    </script>
</body>
</html>
