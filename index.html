<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Synoniemen oefenen - Portugees (BR) → Nederlands</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
            background: #f0f7ff;
            color: #1e2a3a;
        }
        h1 {
            text-align: center;
            color: #0f3b5c;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .main-word {
            text-align: center;
            margin-bottom: 2rem;
        }
        .main-word h2 {
            font-size: 2rem;
            margin: 0.5rem 0;
            color: #1e6f5c;
        }
        .main-word p {
            font-size: 1.2rem;
            color: #2c3e50;
            margin: 0;
        }
        .synonyms-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .synonym-item {
            background: #f9f9fc;
            border-radius: 16px;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .pt-word {
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            background: #eef2f7;
            transition: 0.2s;
            min-width: 150px;
        }
        .revealed {
            background: #d4e6f1;
        }
        .blurred-letters {
            filter: blur(4px);
        }
        .nl-translation {
            font-size: 1rem;
            color: #4a627a;
            background: #e9ecef;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }
        .progress {
            text-align: center;
            margin-top: 1rem;
            font-weight: bold;
            color: #2c6e9e;
        }
        .next-btn, .reset-btn {
            background: #1e6f5c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            margin: 0.5rem;
            transition: 0.2s;
        }
        .next-btn:hover, .reset-btn:hover {
            background: #0e4f40;
            transform: scale(1.02);
        }
        .next-btn:disabled {
            background: #b0bec5;
            cursor: not-allowed;
        }
        .feedback {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 1rem;
            color: #2c6e9e;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6c7a89;
        }
        button {
            background: none;
            border: none;
        }
        @media (max-width: 600px) {
            .pt-word {
                font-size: 1rem;
                min-width: 120px;
            }
            .nl-translation {
                font-size: 0.9rem;
            }
            .main-word h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <h1>📖 Synoniemen oefenen (PT-BR → NL)</h1>
    <div id="app">
        <div class="loading">⏳ Woordenlijst laden uit Google Sheets...</div>
    </div>
    <footer>
        Data uit Google Sheets | Klik op een gebluurd woord om het te ontbluren
    </footer>

    <script>
        // ========== CONFIGURATIE ==========
        const API_KEY = 'AIzaSyB-ECNnPUEH4PP0EsbsdK74ChN2ik10wzg';       // Vervang door jouw API key
        const SHEET_ID = '1wHmIeIga8mYQG4h4uuvgPiehn-pc0D7Ptyma9bVnfv0';   // Vervang door jouw sheet ID
        const SHEET_NAME = 'Blad1';               // De naam van het tabblad (default Blad1)
        // ====================================

        let exercises = [];
        let currentIndex = 0;
        let revealedStatus = [];

        // Fisher-Yates shuffle
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function fetchWords() {
            let url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_NAME)}?key=${API_KEY}`;
            try {
                let response = await fetch(url);
                let data = await response.json();
                
                if (data.error && data.error.code === 404) {
                    console.warn(`Tabblad "${SHEET_NAME}" niet gevonden, zoek eerste tabblad...`);
                    const metadataUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?key=${API_KEY}`;
                    const metaResponse = await fetch(metadataUrl);
                    const metaData = await metaResponse.json();
                    if (metaData.sheets && metaData.sheets.length > 0) {
                        const firstSheetName = metaData.sheets[0].properties.title;
                        console.log(`Eerste tabblad gevonden: "${firstSheetName}"`);
                        url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(firstSheetName)}?key=${API_KEY}`;
                        response = await fetch(url);
                        data = await response.json();
                    } else {
                        throw new Error('Geen tabbladen gevonden in de sheet.');
                    }
                }
                
                if (!data.values) {
                    throw new Error('Geen data gevonden. Controleer of de sheet openbaar is en of er rijen met data staan.');
                }
                console.log('Ruwe data uit sheet:', data.values);
                return parseSheetData(data.values);
            } catch (error) {
                console.error(error);
                document.getElementById('app').innerHTML = `<div class="card" style="color:red;">❌ Fout bij laden: ${error.message}<br>Controleer je API‑sleutel, sheet‑ID en of de sheet openbaar is.</div>`;
                return [];
            }
        }

        function parseSheetData(rows) {
            if (rows.length < 2) return [];
            const headers = rows[0].map(h => h ? h.trim().toLowerCase() : '');
            console.log('Headers (lowercase):', headers);
            
            const mainPtIdx = headers.findIndex(h => h === 'hoofd_werkwoord_pt');
            const mainNlIdx = headers.findIndex(h => h === 'hoofd_vertaling_nl');
            if (mainPtIdx === -1 || mainNlIdx === -1) {
                console.error('Kolommen "hoofd_werkwoord_pt" en/of "hoofd_vertaling_nl" niet gevonden.');
                return [];
            }
            
            const synonymPairs = [];
            for (let i = 0; i < headers.length; i++) {
                if (headers[i].startsWith('synoniem_pt')) {
                    const nlHeader = headers[i].replace('pt', 'nl');
                    const nlIdx = headers.findIndex(h => h === nlHeader);
                    if (nlIdx !== -1) {
                        synonymPairs.push({ ptIdx: i, nlIdx: nlIdx });
                    } else {
                        console.warn(`Geen bijbehorende nl-kolom gevonden voor ${headers[i]}`);
                    }
                }
            }
            console.log('Synoniem paren (kolomindices):', synonymPairs);
            
            const exercisesList = [];
            for (let r = 1; r < rows.length; r++) {
                const row = rows[r];
                if (!row || row.length === 0) continue;
                const mainPt = row[mainPtIdx]?.trim();
                const mainNl = row[mainNlIdx]?.trim();
                if (!mainPt || !mainNl) continue;
                
                const synonyms = [];
                for (let pair of synonymPairs) {
                    const pt = row[pair.ptIdx]?.trim();
                    const nl = row[pair.nlIdx]?.trim();
                    if (pt && nl) {
                        synonyms.push({ pt, nl });
                    }
                }
                if (synonyms.length === 0) continue;
                exercisesList.push({ mainPt, mainNl, synonyms });
            }
            console.log(`Totaal ${exercisesList.length} oefeningen geladen.`);
            return exercisesList;
        }

        function renderExercise() {
            if (!exercises.length) return;
            const exercise = exercises[currentIndex];
            const synonyms = exercise.synonyms;
            const revealed = revealedStatus[currentIndex];
            
            let synonymsHtml = '';
            synonyms.forEach((syn, idx) => {
                const isRevealed = revealed[idx];
                let displayHtml = '';
                if (isRevealed) {
                    displayHtml = syn.pt;
                } else {
                    const firstLetter = syn.pt.charAt(0);
                    const restLetters = syn.pt.slice(1);
                    displayHtml = `${firstLetter}<span class="blurred-letters">${restLetters}</span>`;
                }
                synonymsHtml += `
                    <div class="synonym-item">
                        <div class="pt-word ${isRevealed ? 'revealed' : ''}" data-idx="${idx}">
                            ${displayHtml}
                        </div>
                        <div class="nl-translation">${syn.nl}</div>
                    </div>
                `;
            });
            
            const allRevealedFlag = revealed.every(v => v === true);
            const nextDisabled = !allRevealedFlag;
            
            const html = `
                <div class="card">
                    <div class="main-word">
                        <h2>${exercise.mainPt}</h2>
                        <p>🇳🇱 ${exercise.mainNl}</p>
                    </div>
                    <div class="synonyms-list">
                        ${synonymsHtml}
                    </div>
                    <div class="progress">
                        Oefening ${currentIndex+1} van ${exercises.length}
                    </div>
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <button class="next-btn" id="nextBtn" ${nextDisabled ? 'disabled' : ''}>➡ Volgende oefening</button>
                        <button class="reset-btn" id="resetBtn">🔄 Opnieuw beginnen</button>
                    </div>
                    <div class="feedback" id="feedback">
                        ${!allRevealedFlag ? 'Klik op de geblurde woorden om ze te ontbluren.' : 'Alle woorden zijn ontblurd! Ga verder.'}
                    </div>
                </div>
            `;
            
            const app = document.getElementById('app');
            app.innerHTML = html;
            
            document.querySelectorAll('.pt-word').forEach(el => {
                el.addEventListener('click', (e) => {
                    const idx = parseInt(el.dataset.idx);
                    if (!revealedStatus[currentIndex][idx]) {
                        revealedStatus[currentIndex][idx] = true;
                        renderExercise();
                    }
                    e.stopPropagation();
                });
            });
            
            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    if (currentIndex + 1 < exercises.length) {
                        currentIndex++;
                        renderExercise();
                    } else {
                        const app = document.getElementById('app');
                        app.innerHTML = `
                            <div class="card">
                                <h2>🏆 Gefeliciteerd! 🏆</h2>
                                <p>Je hebt alle ${exercises.length} oefeningen voltooid.</p>
                                <button class="reset-btn" id="resetEndBtn">Opnieuw beginnen</button>
                            </div>
                        `;
                        document.getElementById('resetEndBtn').addEventListener('click', resetGame);
                    }
                });
            }
            
            const resetBtn = document.getElementById('resetBtn');
            if (resetBtn) resetBtn.addEventListener('click', resetGame);
        }
        
        function resetGame() {
            // Schud de oefeningen opnieuw
            exercises = shuffleArray(exercises);
            currentIndex = 0;
            revealedStatus = exercises.map(ex => Array(ex.synonyms.length).fill(false));
            renderExercise();
        }
        
        async function init() {
            exercises = await fetchWords();
            if (exercises.length === 0) {
                document.getElementById('app').innerHTML = '<div class="card">❌ Geen geldige oefeningen gevonden. Controleer de kolomnamen en de data in je sheet. Bekijk de console (F12) voor details.</div>';
                return;
            }
            // Schud de oefeningen willekeurig
            exercises = shuffleArray(exercises);
            revealedStatus = exercises.map(ex => Array(ex.synonyms.length).fill(false));
            renderExercise();
        }
        
        init();
    </script>
</body>
</html>
